services:
  - type: web
    name: race-candidates-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 1 --timeout 120
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: IMPORT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: race-db
          property: connectionString

  - type: cron
    name: race-candidates-collector
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python collector.py
    schedule: "*/10 23,0-09 * * *"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: IMPORT_TOKEN
        sync: false
      - key: RENDER_IMPORT_URL
        value: https://race-candidates-app.onrender.com/api/import_latest_candidates
