databases:
  - name: race-db
    databaseName: race_app
    user: race_user
    plan: free

services:
  - type: web
    name: race-candidates-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: race-db
          property: connectionString
      - key: EXTERNAL_URL
        sync: false
